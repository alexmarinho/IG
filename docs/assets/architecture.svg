<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img"
     aria-label="Architecture: one validated objective, compiled once, reused by every surface.">
  <defs>
    <pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#2254a3" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a8377"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b0562f"/>
    </marker>
    <style>
      .lbl{font:600 10px Menlo,monospace;letter-spacing:.09em;text-transform:uppercase;fill:#8a8377}
      .nm{font:600 14.5px Georgia,serif;fill:#2a2620}
      .sub{font:400 11px Menlo,monospace;fill:#6a6255}
      .box{fill:#fbf8f1;stroke:#e2d9c8}
      .edge{stroke:#8a8377;stroke-width:1.4;fill:none;marker-end:url(#a)}
      .edgeo{stroke:#b0562f;stroke-width:1.8;fill:none;marker-end:url(#ao)}
    </style>
  </defs>

  <rect width="1040" height="600" fill="#f6f1e8"/>
  <rect width="1040" height="600" fill="url(#g)"/>

  <text x="40" y="42" class="nm" font-size="19">One validated objective, compiled once, reused everywhere</text>
  <text x="40" y="64" class="sub">every surface below prices a schedule with the same arithmetic — that is the invariant the tests defend</text>

  <!-- ── data ── -->
  <text x="40" y="108" class="lbl">Benchmark data</text>
  <rect x="40" y="118" width="200" height="58" rx="8" class="box"/>
  <text x="56" y="142" class="nm">masclib/</text>
  <text x="56" y="161" class="sub">44 MaScLib instances</text>

  <rect x="252" y="118" width="184" height="58" rx="8" class="box"/>
  <text x="268" y="142" class="nm">masclib-gpu/ · -llm/</text>
  <text x="268" y="161" class="sub">synthetic workloads</text>

  <!-- ── core ── -->
  <text x="40" y="228" class="lbl">Core — the only place cost is defined</text>
  <rect x="40" y="238" width="266" height="100" rx="9" fill="#fbf8f1" stroke="#b0562f" stroke-width="2"/>
  <text x="58" y="266" class="nm">engine/ · Rust</text>
  <text x="58" y="287" class="sub">incremental evaluator,</text>
  <text x="58" y="305" class="sub">fixed-point objective</text>
  <text x="58" y="328" class="sub" fill="#b0562f">→ native CLI + WebAssembly</text>

  <rect x="366" y="238" width="220" height="100" rx="9" class="box"/>
  <text x="384" y="266" class="nm">python/</text>
  <text x="384" y="287" class="sub">zero-dependency</text>
  <text x="384" y="305" class="sub">reference + ig-solve</text>

  <path d="M306 288 H366" stroke="#7a8b6f" stroke-width="1.6" fill="none"/>
  <text x="336" y="281" text-anchor="middle" style="font:700 12px Menlo,monospace" fill="#7a8b6f">=</text>
  <text x="600" y="364" class="sub" fill="#7a8b6f">golden tests: both price identical schedules to the deci-unit</text>

  <!-- data → core -->
  <path d="M140 176 V238" class="edge"/>
  <path d="M344 176 V206 H476 V238" class="edge"/>

  <!-- ── surfaces ── -->
  <text x="40" y="410" class="lbl">Surfaces</text>
  <g>
    <rect x="40" y="462" width="212" height="78" rx="8" class="box" stroke="#b0562f"/>
    <text x="58" y="488" class="nm">docs/index.html</text>
    <text x="58" y="508" class="sub">the live explanation</text>
    <text x="58" y="526" class="sub">→ embeds the Studio</text>

    <rect x="268" y="462" width="196" height="78" rx="8" class="box"/>
    <text x="286" y="488" class="nm">studio/</text>
    <text x="286" y="508" class="sub">browser experiment</text>
    <text x="286" y="526" class="sub">53 fixed instances</text>

    <rect x="480" y="462" width="196" height="78" rx="8" class="box"/>
    <text x="498" y="488" class="nm">google-sheets/</text>
    <text x="498" y="508" class="sub">Apps Script lab</text>
    <text x="498" y="526" class="sub">+ .xlsx snapshot</text>

    <rect x="692" y="462" width="200" height="78" rx="8" class="box"/>
    <text x="710" y="488" class="nm">notebooks/</text>
    <text x="710" y="508" class="sub">Colab, EN + PT-BR</text>
    <text x="710" y="526" class="sub">multi-seed statistics</text>
  </g>

  <!-- WebAssembly bus into the three browser surfaces -->
  <path d="M150 338 V432 H146 V456" class="edgeo"/>
  <path d="M150 338 V432 H366 V456" class="edgeo"/>
  <path d="M150 338 V432 H578 V456" class="edgeo"/>
  <!-- the Python reference drives the notebooks -->
  <path d="M476 338 V420 H792 V456" class="edge"/>

  <!-- ── research + archive: deliberately unconnected ── -->
  <text x="820" y="108" class="lbl">Research</text>
  <rect x="820" y="118" width="180" height="58" rx="8" class="box" stroke-dasharray="4 3"/>
  <text x="836" y="142" class="nm">gpu/ · factory/</text>
  <text x="836" y="161" class="sub">fleet · operator search</text>

  <text x="820" y="228" class="lbl">Frozen</text>
  <rect x="820" y="238" width="180" height="58" rx="8" class="box" stroke-dasharray="4 3"/>
  <text x="836" y="262" class="nm">legacy/</text>
  <text x="836" y="281" class="sub">2015–2017, untouched</text>

  <text x="40" y="576" class="sub">Orange: the compiled WebAssembly engine. Grey: the Python reference. Dashed boxes sit outside the validated path by design.</text>
</svg>
